apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: chaos-mesh
  namespace: chaos-testing
spec:
  interval: 5m
  chart:
    spec:
      chart: chaos-mesh
      version: '2.6.3'
      sourceRef:
        kind: HelmRepository
        name: chaos-mesh
        namespace: flux-system
  values:
    # Minimal configuration for basic chaos experiments
    # Only enable what's needed for pod-kill, pod-failure, and dns-chaos
    chaosDaemon:
      # hostNetwork: true - Only needed for NetworkChaos (which we disabled)
      # privileged: true - Only needed for container manipulation (which we disabled)
      # Try with minimal permissions first
      hostNetwork: false
      privileged: false
      # Configure runtime/socket for k3s/k3d (containerd)
      runtime: containerd
      # Use the path the daemon sees inside the container when we mount
      # the host's containerd directory into /host-run. The live DaemonSet
      # uses /host-run/containerd.sock so we match that here.
      runtimeSocketPath: /host-run/containerd.sock
      # Mount the containerd runtime directory into the daemon pod
      hostPathMounts:
        - name: containerd-runtime
          mountPath: /host-run
          hostPath: /run/k3s/containerd
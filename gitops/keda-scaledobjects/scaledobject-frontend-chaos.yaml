apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: frontend-scaledobject-chaos
  namespace: app-frontend
spec:
  scaleTargetRef:
    name: frontend
  minReplicaCount: 1
  maxReplicaCount: 5
  cooldownPeriod: 300
  pollingInterval: 30
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
      # Scale frontend if chaos experiments increased in the last 5 minutes
      query: 'increase(chaos_controller_manager_experiments_total{namespace="chaos-testing"}[5m])'
      threshold: '1'
    # No authenticationRef required for in-cluster Prometheus

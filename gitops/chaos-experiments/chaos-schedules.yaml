---
# Consolidated Sustainable Chaos Experiments for Observable Impact
# These experiments are spaced to avoid overlap and provide sustained observable metrics

# Schedule 1: Backend Pod Kill (Every 20 minutes) - Tests resilience and triggers scaling
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: backend-resilience-test
  namespace: chaos-testing
  labels:
    purpose: "resilience-testing"
spec:
  schedule: "*/5 * * * *"  # Every 5 minutes for faster testing
  type: PodChaos
  podChaos:
    selector:
      namespaces:
        - app-backend
      labelSelectors:
        "app": "backend"
    mode: one
    action: pod-kill
    # keep the pod-kill in place for a short observable window so it appears in the Chaos UI
    duration: "2m"

---
# Schedule 2: Network Latency (Every 15 minutes, offset +5) - Creates observable latency spikes
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: backend-latency-test
  namespace: chaos-testing
  labels:
    purpose: "latency-testing"
spec:
  schedule: "1,3,6,8 * * * *"  # Every 2-3 minutes with offsets for faster testing
  type: NetworkChaos
  networkChaos:
    selector:
      namespaces:
        - app-backend
      labelSelectors:
        "app": "backend"
    mode: one
    action: delay
    delay:
      latency: "400ms"
      correlation: "100"
      jitter: "200ms"
    duration: "3m"  # Long enough to be observed
    direction: to

---
# Schedule 3: Memory Stress (Every 25 minutes, offset +10) - Tests memory pressure
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: backend-memory-stress
  namespace: chaos-testing
  labels:
    purpose: "memory-testing"
spec:
  schedule: "2,7 * * * *"  # Every 5 minutes, offset by 2 for faster testing
  type: StressChaos
  stressChaos:
    selector:
      namespaces:
        - app-backend
      labelSelectors:
        "app": "backend"
    mode: one
    stressors:
      memory:
        workers: 6
        # Use standard Kubernetes binary SI quantity (unquoted)
        size: "128MiB"  # Stress memory to trigger resource pressure
    duration: "4m"  # Long enough for monitoring

---
# Schedule 4: Multi-Pod Failure (Every 30 minutes, offset +15) - Tests load balancing
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: backend-loadbalance-test
  namespace: chaos-testing
  labels:
    purpose: "loadbalancing-testing"
spec:
  schedule: "4,9 * * * *"  # Every 5 minutes, offset by 4 for faster testing
  type: PodChaos
  podChaos:
    selector:
      namespaces:
        - app-backend
      labelSelectors:
        "app": "backend"
    mode: fixed-percent
    value: "50"  # Kill 50% of backend pods
    action: pod-failure
    duration: "2m"  # Sustained impact

---
# Schedule 5: Flux Controller Test (Every 45 minutes) - Tests GitOps resilience
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: flux-resilience-test
  namespace: chaos-testing
  labels:
    purpose: "gitops-testing"
spec:
  schedule: "*/10 * * * *"  # Every 10 minutes for faster testing
  type: PodChaos
  podChaos:
    selector:
      namespaces:
        - flux-system
      labelSelectors:
        "app.kubernetes.io/part-of": "flux"
    mode: one
    action: pod-kill
    # keep the flux pod-kill observable so dashboard/events show it
    duration: "1m"
---
apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: node-cpu-stress-schedule
  namespace: chaos-testing
spec:
  schedule: "*/5 * * * *"  # Every 5 minutes
  type: StressChaos
  stressChaos:
    selector:
      namespaces:
        - app-backend
      labelSelectors:
        app: backend
    mode: all
    # Stress most logical cores on each targeted pod to raise node CPU
    # NOTE: set `workers:` to match your node CPU cores. Run
    #   ./scripts/compute_node_workers.sh
    # to auto-detect node cores and patch this file before applying.
    stressors:
      cpu:
        # workers will be auto-adjusted by scripts/compute_node_workers.sh
        workers: 6
        # reduce load to 30 for less intense stress
        load: 30
    # Run for 4 minutes
    duration: "4m"
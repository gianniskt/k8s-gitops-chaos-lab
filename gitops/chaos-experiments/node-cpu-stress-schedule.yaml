apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: node-cpu-stress-schedule
  namespace: chaos-testing
spec:
  schedule: "@every 10m"
  type: StressChaos
  stressChaos:
    selector:
      namespaces:
        - app-backend
      labelSelectors:
        app: backend
    mode: all
    # Stress most logical cores on each targeted pod to raise node CPU
    stressors:
      cpu:
        # match observed cores per node (16) so we exert heavy pressure
        workers: 16
        load: 90
    # Run longer than 5 minutes to ensure Prometheus scrapes capture the usage
    duration: "6m"
